name: Java CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run API tests
        run: mvn -B "-Dtest=AuthUserTest,GenerateTokenTest,GetBooksTest" test

      - name: Upload API surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload API allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: allure-results
          if-no-files-found: ignore

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run UI tests
        run: xvfb-run --auto-servernum mvn -B "-Dtest=LoginUITest,BookSearchTest" test

      - name: Upload UI surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload UI allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: allure-results
          if-no-files-found: ignore
